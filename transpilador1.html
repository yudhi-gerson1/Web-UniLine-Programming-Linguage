<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web-UniLine v1.2</title>

<style>
:root{
    --bg:#1a1a1a;
    --panel:#252525;
    --blue:#00aaff;
    --green:#00ff66;
    --text:#e0e0e0;
    --error:#ff5555;
    --warning:#ffaa00;
}

body{
    margin:0;
    padding:20px;
    background:var(--bg);
    color:var(--text);
    font-family:Consolas,monospace;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.logo{
    width:90px;
    height:90px;
    border:4px solid var(--blue);
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:10px;
}

.logo span{
    font-size:40px;
    font-weight:bold;
    color:var(--blue);
}

h1{
    margin:5px 0;
    color:var(--blue);
}

.lema{
    font-style:italic;
    opacity:.8;
    margin-bottom:20px;
}

.warning{
    background:#332200;
    border-left:5px solid var(--warning);
    padding:15px;
    margin-bottom:20px;
    width:100%;
    max-width:1000px;
    border-radius:10px;
    color:#ffd27a;
}

.container{
    width:100%;
    max-width:1000px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

textarea{
    width:100%;
    height:170px;
    resize:none;
    background:var(--panel);
    border:2px solid var(--blue);
    border-radius:15px;
    padding:20px;
    box-sizing:border-box;
    font-size:1em;
    color:var(--blue);
    outline:none;
}

button{
    align-self:flex-end;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:var(--blue);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition: 0.2s;
}

button:active{
    transform:scale(0.95);
}

#terminal{
    width:100%;
    min-height:320px;
    background:black;
    border-left:6px solid var(--blue);
    border-radius:10px;
    padding:20px;
    box-sizing:border-box;
    white-space:pre-wrap;
    overflow-y:auto;
    color:var(--green);
    font-size:1.1em;
}

.error{
    color:var(--error);
    font-weight:bold;
}
</style>
</head>

<body>

<div class="logo">
<span>&gt;_</span>
</div>

<h1>Web-UniLine v1.2</h1>

<div class="lema">
"Se tem uma linha, tem história!"
</div>

<div class="warning">
⚠️ Cuidado: Agora o UniLine tem erros na v1.2! Verifique o código antes de executar.
</div>

<div class="container">
<textarea id="codigo" placeholder='Exemplo:
ww random x
n = randomint(1, 10) x
show(n)'></textarea>

<button onclick="executar()">EXECUTAR</button>

<div id="terminal">>_ UniLine iniciado... (Fundação: 06/05/26)</div>
</div>

<a href="bibliotecas.html" style="color: var(--blue); text-decoration: none; font-size: 0.9em; margin-top: 10px;">
    &lt; Abrir Manual de Bibliotecas &gt;
</a>

<script>
let memoria = {};
let libs = { random: false, boolean: false };
let statusCondicional = false;
const terminal = document.getElementById("terminal");

function print(txt) {
    let output = txt;
    if (txt === true || txt === "yes") output = "yes";
    else if (txt === false || txt === "no") output = "no";
    else if (txt === null || txt === "wdef") output = "wdef";
    
    terminal.innerHTML += `\n> ${output}`;
    terminal.scrollTop = terminal.scrollHeight;
}

function throwError(name, message) {
    throw { name: name, message: `${name}: ${message}` };
}

// Separador de comandos 'x' melhorado
function separar(codigo) {
    let comandos = [];
    let atual = "";
    let aspas = null;
    let nivelP = 0;

    for (let i = 0; i < codigo.length; i++) {
        let c = codigo[i];
        if (c === '"' || c === "'") {
            if (aspas === c) aspas = null;
            else if (!aspas) aspas = c;
        }
        if (!aspas) {
            if (c === "(") nivelP++;
            if (c === ")") nivelP--;
            
            // Verifica o 'x' como separador (precisa de espaços ou ser fim de linha)
            if (c === "x" && nivelP === 0) {
                let ant = i > 0 ? codigo[i-1] : " ";
                let prox = i < codigo.length - 1 ? codigo[i+1] : " ";
                if (/\s/.test(ant) && /\s/.test(prox)) {
                    if (atual.trim() === "") throwError("XError", "expected a command before 'x'.");
                    comandos.push(atual.trim());
                    atual = "";
                    continue;
                }
            }
        }
        atual += c;
    }
    if (atual.trim() !== "") comandos.push(atual.trim());
    else if (codigo.trim().endsWith("x")) throwError("XError", "expected a command after 'x'.");
    return comandos;
}

function verificarParenteses(cmd) {
    let aberto = (cmd.match(/\(/g) || []).length;
    let fechado = (cmd.match(/\)/g) || []).length;
    if (aberto !== fechado) throwError("UnclosedError", "expected ')' after a function.");
}

// Calculadora manual para evitar eval()
function calcularMath(expressao) {
    let exp = expressao.replace(/elev/g, "**").trim();
    
    if (exp.includes("/0") || exp.includes("/ 0")) throwError("DivisionError", "Cannot divide by 0.");

    // Substituir variáveis e constantes UniLine
    exp = exp.replace(/\b[a-zA-Z_][a-zA-Z0-9_]*\b/g, (match) => {
        if (match === "yes") return "true";
        if (match === "no") return "false";
        if (match === "wdef") return "null";
        if (match in memoria) return JSON.stringify(memoria[match]);
        return match;
    });

    try {
        // Usa a construção de Function apenas para o escopo matemático isolado
        return new Function(`return (${exp})`)();
    } catch (e) {
        throwError("AnyError", "Fatal Error while parsing math.");
    }
}

function valor(v) {
    v = v.trim();
    if (v === "yes") return "yes";
    if (v === "no") return "no";
    if (v === "wdef") return "wdef";
    if (v in memoria) return memoria[v];
    if (/^["'].*["']$/.test(v)) return v.slice(1, -1);
    if (v === "waitkb()") return prompt("UniLine Input:") || "";

    // BIBLIOTECA RANDOM
    if (libs.random) {
        if (v.startsWith("randomint(")) {
            let m = v.match(/randomint\((.*?),(.*?)\)/);
            if (m) {
                let a = Number(valor(m[1])), b = Number(valor(m[2]));
                return Math.floor(Math.random() * (b - a + 1)) + a;
            }
        }
        if (v.startsWith("randomdb(")) {
            let m = v.match(/randomdb\((.*?),(.*?)\)/);
            if (m) {
                let a = Number(valor(m[1])), b = Number(valor(m[2]));
                return (Math.random() * (b - a) + a).toFixed(2);
            }
        }
        if (v.startsWith("randomstr(")) {
            let m = v.match(/randomstr\((.*?)\)/);
            if (m) {
                let len = Number(valor(m[1])), res = "", chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
                for (let i = 0; i < len; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
                return res;
            }
        }
    }

    // BIBLIOTECA BOOLEAN (CORRIGIDA)
    if (libs.boolean) {
        if (v.startsWith("intBool(")) {
            let arg = v.match(/intBool\((.*)\)/)[1];
            let res = valor(arg);
            return (res === "yes" || res === true) ? 1 : 0;
        }
        if (v.startsWith("kwBool(")) {
            let arg = v.match(/kwBool\((.*)\)/)[1];
            let res = Number(valor(arg));
            return res === 1 ? "yes" : "no";
        }
        if (v.startsWith("verifyBool(")) {
            let m = v.match(/verifyBool\((.*?)\s+(and|or|xor|nand|nor)\s+(.*?)\)/);
            if (m) {
                let a = valor(m[1]) === "yes";
                let op = m[2];
                let b = valor(m[3]) === "yes";
                switch(op) {
                    case "and": return (a && b) ? "yes" : "no";
                    case "or":  return (a || b) ? "yes" : "no";
                    case "xor": return (a !== b) ? "yes" : "no";
                    case "nand":return !(a && b) ? "yes" : "no";
                    case "nor": return !(a || b) ? "yes" : "no";
                }
            }
        }
    }

    // VERIFY E MATEMÁTICA
    if (v.startsWith("verify(")) {
        let exp = v.match(/verify\((.*)\)/)[1];
        // Transforma comparações UniLine em JS
        let jsExp = exp.replace(/==/g, "===").replace(/!=/g, "!==");
        return calcularMath(jsExp) ? "yes" : "no";
    }

    // Se contém operadores, calcula
    if (/[+\-*/%<>=!]|elev/.test(v)) {
        return calcularMath(v);
    }

    if (/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(v) && !(v in memoria)) {
        throwError("VariableError", `"${v}" is not defined.`);
    }

    return v;
}

function avaliarLogica(exp) {
    let r = valor(exp);
    return r === "yes" || r === true;
}

function executarBloco(txt) {
    let cmds = separar(txt);
    cmds.forEach(c => executarComando(c));
}

function executarComando(cmd) {
    cmd = cmd.trim();
    if (!cmd) return;
    verificarParenteses(cmd);

    // WW (Work With)
    if (cmd.startsWith("ww ")) {
        let lib = cmd.split(" ")[1];
        if (libs[lib] !== undefined) {
            libs[lib] = true;
            print(`[SISTEMA]: Biblioteca ${lib} ativada.`);
        } else {
            throwError("SyntaxError", "Unknown command detected.");
        }
        return;
    }

    // SHOW E CALCULATE
    if (cmd.startsWith("show(")) {
        let m = cmd.match(/show\((.*)\)/);
        if (m) print(valor(m[1]));
        return;
    }
    if (cmd.startsWith("calculate(")) {
        let m = cmd.match(/calculate\((.*)\)/);
        if (m) print(valor(m[1]));
        return;
    }

    // CONDICIONAIS
    if (cmd.startsWith("if(")) {
        let m = cmd.match(/if\((.*?)\)\s*then\((.*)\)/);
        if (!m) throwError("SyntaxError", "Invalid if structure.");
        statusCondicional = avaliarLogica(m[1]);
        if (statusCondicional) executarBloco(m[2]);
        return;
    }
    if (cmd.startsWith("elif(")) {
        if (statusCondicional) return;
        let m = cmd.match(/elif\((.*?)\)\s*then\((.*)\)/);
        if (!m) throwError("SyntaxError", "Invalid elif structure.");
        statusCondicional = avaliarLogica(m[1]);
        if (statusCondicional) executarBloco(m[2]);
        return;
    }
    if (cmd.startsWith("else(")) {
        if (statusCondicional) return;
        let m = cmd.match(/else\((.*)\)/);
        if (m) executarBloco(m[1]);
        return;
    }

    // LOOPS
    if (cmd.startsWith("repeat(")) {
        let m = cmd.match(/repeat\((.*?)\):(.*)/);
        if (!m) throwError("SyntaxError", "Invalid repeat structure.");
        let vezes = Number(valor(m[1]));
        for (let i = 0; i < vezes; i++) executarBloco(m[2]);
        return;
    }
    if (cmd.startsWith("while(")) {
        let m = cmd.match(/while\((.*?)\):(.*)/);
        if (!m) throwError("SyntaxError", "Invalid while structure.");
        let safe = 0;
        while (avaliarLogica(m[1]) && safe < 1000) {
            executarBloco(m[2]);
            safe++;
        }
        if(safe >= 1000) throwError("AnyError", "Infinite loop detected.");
        return;
    }
    if (cmd.startsWith("for(")) {
        let m = cmd.match(/for\((.*?)=(.*?),(.*?)until(.*?)\):(.*)/);
        if (!m) throwError("SyntaxError", "Invalid for structure.");
        let varNome = m[1].trim();
        let inicio = Number(valor(m[2]));
        let fim = Number(valor(m[4]));
        let passo = m[3].includes("++") ? 1 : -1;
        for (let i = inicio; passo > 0 ? i <= fim : i >= fim; i += passo) {
            memoria[varNome] = i;
            executarBloco(m[5]);
        }
        return;
    }

    // ATRIBUIÇÃO
    if (cmd.includes("=") && !["==", ">=", "<=", "!="].some(op => cmd.includes(op))) {
        let partes = cmd.split("=");
        let nome = partes[0].trim();
        let val = partes[1].trim();
        memoria[nome] = valor(val);
        return;
    }

    throwError("GivingUpError", "The error is too fatal that the transpiler gives up executing your project.");
}

function executar() {
    terminal.innerHTML = ">_ Rodando UniLine Engine... (v1.2)";
    memoria = {};
    libs = { random: false, boolean: false };
    statusCondicional = false;
    
    let entrada = document.getElementById("codigo").value;
    try {
        let comandos = separar(entrada);
        comandos.forEach(c => executarComando(c));
    } catch (e) {
        terminal.innerHTML += `\n<span class="error">${e.message || "AnyError: Fatal Error while parsing."}</span>`;
    }
}
</script>
</body>
</html>
