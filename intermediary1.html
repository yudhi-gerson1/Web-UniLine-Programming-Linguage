<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniLine v1.2 - Full Error Handling</title>

<style>
:root{
    --bg:#0d0d0d;
    --panel:#111;
    --blue:#00aaff;
    --cyan:#00ffee;
    --text:#e0e0e0;
    --green:#00ff88;
    --error:#ff5555;
}

body{
    margin:0;
    padding:20px;
    background:var(--bg);
    font-family:Consolas,monospace;
    color:var(--text);
    display:flex;
    flex-direction:column;
    align-items:center;
}

.header{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-bottom:25px;
}

.logo-box{
    width:90px;
    height:90px;
    border:4px solid var(--blue);
    border-radius:14px;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    font-weight:bold;
    color:var(--blue);
    box-shadow:0 0 18px rgba(0,170,255,.4);
}

.lema{
    margin-top:10px;
    color:var(--blue);
    font-style:italic;
}

.terminal{
    width:100%;
    max-width:950px;
    background:black;
    border:2px solid #222;
    border-radius:15px;
    padding:20px;
    box-sizing:border-box;
}

textarea{
    width:100%;
    height:240px;
    resize:none;
    background:var(--panel);
    border:2px solid var(--blue);
    border-radius:12px;
    padding:15px;
    box-sizing:border-box;
    color:var(--cyan);
    font-size:16px;
    font-family:inherit;
    outline:none;
}

button{
    width:100%;
    margin-top:15px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:var(--blue);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition: 0.3s;
}

button:hover{
    background:#0088cc;
    box-shadow:0 0 10px var(--blue);
}

#output{
    margin-top:20px;
    background:#050505;
    border:1px solid #222;
    border-radius:10px;
    padding:20px;
    min-height:220px;
    white-space:pre-wrap;
    overflow-y:auto;
    color:var(--green);
}

.err{
    color:var(--error);
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo-box">&gt;_</div>
    <div class="lema">"Se tem uma linha, tem história!"</div>
</div>

<div class="terminal">

<textarea id="code" placeholder='Teste os erros:
calculate(1 / 0)
show(naoDefinida)
print("erro de sintaxe")
show("oi") x'></textarea>

<button onclick="runUniLine()">EXECUTAR x</button>

<div id="output">&gt;_ UniLine iniciado...</div>

</div>

<script>
const output = document.getElementById("output");
let vars = {};
let funcs = {};

function resetRuntime(){
    vars = { yes: true, no: false, wdef: null };
    funcs = {};
}

function log(text, isError = false){
    if(isError) output.innerHTML += `\n<span class="err">${text}</span>`;
    else output.innerHTML += "\n" + text;
    output.scrollTop = output.scrollHeight;
}

// Lançador de Erros do Manual
function throwError(type, message){
    throw { type: type, msg: message };
}

function splitCommands(code){
    let commands = [];
    let current = "";
    let quote = null;
    let parentheses = 0;
    let brackets = 0;

    // Verificação de XError no final do código
    if(code.trim().endsWith("x")) {
        throwError("XError", "expected a command after 'x'.");
    }

    for(let i = 0; i < code.length; i++){
        let c = code[i];
        if(c === '"' || c === "'"){
            if(quote === c) quote = null;
            else if(!quote) quote = c;
            current += c; continue;
        }
        if(!quote){
            if(c === "(") parentheses++;
            if(c === ")") parentheses--;
            if(c === "[") brackets++;
            if(c === "]") brackets--;
            
            if(c === "x" && parentheses === 0 && brackets === 0){
                let before = code[i-1] || " ";
                let after = code[i+1] || " ";
                if(/\s/.test(before) && /\s/.test(after)){
                    if(current.trim() === "") throwError("XError", "expected a command before 'x'.");
                    commands.push(current.trim());
                    current = ""; continue;
                }
            }
        }
        current += c;
    }
    if(current.trim()) commands.push(current.trim());
    return commands;
}

function parsePrimitive(value) {
    value = value.trim();
    if(value === "yes") return true;
    if(value === "no") return false;
    if(value === "wdef") return null;
    if(!isNaN(value) && value !== "") return Number(value);
    if((value.startsWith('"') && value.endsWith('"')) || (value.startsWith("'") && value.endsWith("'"))) {
        return value.slice(1, -1);
    }
    if(value in vars) return vars[value];
    
    // Se chegou aqui e parece uma variável, mas não existe: VariableError
    if(/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(value)){
        throwError("VariableError", `"${value}" is not defined.`);
    }
    
    return value;
}

function safeMath(exp) {
    exp = exp.replace(/\belev\b/g, "**").trim();
    
    // Verificação de Parênteses: UnclosedError
    let openP = (exp.match(/\(/g) || []).length;
    let closeP = (exp.match(/\)/g) || []).length;
    if(openP !== closeP) throwError("UnclosedError", "expected ')' after a function.");

    let processedExp = exp.replace(/\b[a-zA-Z_][a-zA-Z0-9_]*\b/g, (name) => {
        if (name === "true" || name === "false" || name === "null") return name;
        if (name === "yes") return "true";
        if (name === "no") return "false";
        if (name === "wdef") return "null";
        if (name in vars) return JSON.stringify(vars[name]);
        
        // Se não for palavra reservada nem variável: VariableError
        throwError("VariableError", `"${name}" is not defined.`);
    });

    // DivisionError
    if (processedExp.match(/\/\s*0(?!\.)/)) throwError("DivisionError", "Cannot divide by 0.");

    try {
        return new Function(`"use strict"; return (${processedExp})`)();
    } catch {
        return parsePrimitive(exp);
    }
}

async function execute(command){
    command = command.trim();
    if(!command) return;

    // Verificação de UnclosedError geral
    if((command.match(/\(/g) || []).length !== (command.match(/\)/g) || []).length){
        throwError("UnclosedError", "expected ')' after a function.");
    }

    // Atribuição
    if(command.includes("=") && !command.includes("==") && !command.startsWith("fn ")){
        let parts = command.split("=");
        let name = parts[0].trim();
        let valRaw = parts.slice(1).join("=").trim();
        vars[name] = safeMath(valRaw);
        return;
    }

    // Comandos Conhecidos mas com erro de SyntaxError
    if(command.startsWith("print(")) throwError("SyntaxError", "Unknown command detected."); // UniLine usa show()

    if(command.startsWith("show(")){
        let match = command.match(/^show\((.*)\)$/);
        if(!match) throwError("SyntaxError", "Unknown command detected.");
        let res = safeMath(match[1].trim());
        log("> " + (Array.isArray(res) ? res.join(", ") : res));
        return;
    }

    if(command.startsWith("calculate(")){
        let match = command.match(/^calculate\((.*)\)$/);
        if(!match) throwError("SyntaxError", "Unknown command detected.");
        let content = match[1].trim();
        const temOperador = /[+\-*/%]|elev/.test(content);
        const eNumero = !isNaN(parsePrimitive(content));
        log("> " + (temOperador || eNumero ? safeMath(content) : parsePrimitive(content)));
        return;
    }

    // GivingUpError para comandos completamente irreconhecíveis
    throwError("GivingUpError", "The error is too fatal that the transpiler gives up executing your project.");
}

async function runUniLine(){
    output.innerHTML = ">_ Executando UniLine...";
    resetRuntime();
    try {
        let code = document.getElementById("code").value;
        if(!code.trim()) return;
        let cmds = splitCommands(code);
        for(let c of cmds) await execute(c);
    } catch(e) {
        if(e.type) log(`${e.type}: ${e.msg}`, true);
        else log(`AnyError: Fatal Error while parsing.`, true);
    }
}
</script>
</body>
</html>
